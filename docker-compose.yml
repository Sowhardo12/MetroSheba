version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: metrosheba_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: metrosheba
    ports:
      - "5433:5432"
    volumes:
      - ./docker/db_init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d metrosheba"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: